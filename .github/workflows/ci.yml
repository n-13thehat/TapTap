name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        env:
          NODE_ENV: test

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          # Build-time stubs so Next.js does not fail on missing secrets in CI.
          # Real values are injected at deploy-time by Vercel.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXTAUTH_SECRET: ci-build-only-not-a-real-secret
          NEXTAUTH_URL: http://localhost:3000
